<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" href="../../styles/css/users-page.css">
    <script src="../../scripts/script.js"></script>
</head>
<body>

<header class="header"></header>

    <section class="search" id="search"></section>
    <section class="user-list__container">

            <div class="user-card">

            </div>

            <section class="user-card">

                    </div>
                    <div class="selection__wrapper">

                                Студент

                        <div class="select-option-user select select-option-user-2 unvisible">

                                Студент

                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div class="button__show-more__container">

                Показать еще
            </button>
        </div>
    </section>
</main>

<footer class="footer"></footer>

<script src="../../scripts/components/searchComponent.js"></script>
<script src="../../scripts/components/userComponent.js"></script>
