<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events</title>
    <script src="../../scripts/script.js"></script>
    <link rel="stylesheet" href="../../styles/css/events-page.css">
    <link type="Image/x-icon" href="../../assets/icons/brsm-icon.png" rel="icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="header"></header>

<main class="main">
    <div class="search-and-add">
        <section class="search" id="search"></section>
        <div class="button-plus">+</div>
    </div>

    <div class="events-list">
        <div class="event-card">
            <div class="event-card__image-container">
                <img src="../../assets/images/vozlozhenie%201.png" alt="Event Image" class="event-card__img">
            </div>
            <div class="event-card__info">
                <h2 class="event-card__title">Возложение к памятнику</h2>
                <div class="event-card__event-info">
                    <div class="event-card__event-info__row">
                        <p class="event-card__event-info__row-title">Дата:</p>
                        <p class="event-card__event-info__row-text">23.10.2024</p>
                    </div>

                    <div class="event-card__event-info__row">
                        <p class="event-card__event-info__row-title">Время:</p>
                        <p class="event-card__event-info__row-text">09:00</p>
                    </div>

                    <div class="event-card__event-info__row">
                        <p class="event-card__event-info__row-title">Место встречи: </p>
                        <p class="event-card__event-info__row-text">Стелла</p>
                    </div>

                    <div class="event-card__event-info__row">
                        <p class="event-card__event-info__row-title">Количество ОПТ:</p>
                        <p class="event-card__event-info__row-text">2ч</p>
                    </div>

                    <div class="event-card__event-info__row">
                        <p class="event-card__event-info__row-title">Ходатайство:</p>
                        <p class="event-card__event-info__row-text">Для ходатайства</p>
                    </div>
                </div>
            </div>

            <button class="dark-blue-button">Изменить</button>
        </div>


    </div>

</main>

<footer class="footer"></footer>

<script src="../../scripts/components/searchComponent.js"></script>
<script src="../../scripts/eventsPage.js"></script>
</body>
</html>
