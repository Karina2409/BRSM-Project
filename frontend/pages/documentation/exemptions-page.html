<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>БРСМ БГУИР</title>
    <link rel="stylesheet" href="../../styles/css/exemptions-page.css">
    <link type="Image/x-icon" href="../../assets/icons/brsm-icon.png" rel="icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="header"></header>

<main class="main">

    <div class="controls__container">

    </div>

    <div class="controls">
        <section class="search" id="search"></section>
        <div class="button-plus create-event">+</div>
    </div>

    <div class="exemptions-list">

    </div>

    <div class="button__show-more__container">
        <button class="empty-button show-more" onclick="addExemptionsCard()">
            Показать еще
        </button>
    </div>

    <section class="modal__yes-or-no invisible">
        <div class="modal__yes-or-no__container">
            <div class="modal__close-button">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30 10L10 30" stroke="#181C29" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M10 10L30 30" stroke="#181C29" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>
            <div class="modal__yes-or-no__heading">Вы точно хотите удалить?</div>
            <div class="controls__yes-or-no">
                <div class="controls__yes empty-button">Да</div>
                <div class="controls__no dark-blue-button">Нет</div>
            </div>
        </div>
    </section>
</main>

<footer class="footer"></footer>

<script src="../../scripts/exemptionsPage.js"></script>
<script src="../../scripts/components/searchComponent.js"></script>
<script src="../../scripts/docsPage.js"></script>
<script src="../../scripts/components/exemptionComponent.js"></script>
<script src="../../scripts/script.js"></script>
</body>
</html>
